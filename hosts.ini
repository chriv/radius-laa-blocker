# Host inventory. One section per active deployment instance.
# Per-instance secrets and overrides live in hosts/<instance>/.env (gitignored).
# See hosts/<instance>/.env.example for all available keys.
#
# Physical hosts:
#   host-1 = Mac mini (local machine) — Docker Compose
#   host-2 = rasp5-1.rennerfamily.org  — CapRover

[host-1]
physical_host = host-1
deploy_method = compose
arch = aarch64

[host-2]
physical_host = host-2
deploy_method = caprover
arch = aarch64
