services:
  freeradius:
    image: freeradius/freeradius-server:latest
    ports:
      - "1812:1812/udp"
    volumes:
      # Mount custom config files read-only. Edit the files in ./config/ and
      # run `docker compose restart` to pick up changes — no rebuild needed.
      - ./config/radiusd.conf:/etc/freeradius/radiusd.conf:ro
      - ./config/clients.conf:/etc/freeradius/clients.conf:ro
      - ./config/sites-available/default:/etc/freeradius/sites-available/default:ro
    restart: unless-stopped
